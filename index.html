<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orpita — Build Games Together</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- استدعاء الخطوط في الـ <head> -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Russo+One&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/src/css/style.css" />
</head>
<body>

  <section class="hero" id="hero" aria-label="Orpita Community Hero">

    <!-- Mosaic Layer -->
    <div class="hero__mosaic-layer" id="mosaicLayer" aria-hidden="true">
      <div class="hero__mosaic-band" id="mosaicBand"></div>
    </div>

    <!-- Overlay Layer -->
    <div class="hero__overlay-layer" aria-hidden="true">
      <div class="hero__overlay hero__overlay--vignette"></div>
      <div class="hero__overlay hero__overlay--left-curtain"></div>
      <div class="hero__overlay hero__overlay--right-curtain"></div>
      <div class="hero__overlay hero__overlay--bottom"></div>
      <div class="hero__overlay hero__overlay--top"></div>
      <div class="hero__overlay hero__overlay--centre"></div>
      <div class="hero__overlay hero__overlay--purple-bleed"></div>
    </div>

    <!-- Content -->
    <div class="hero__content" id="heroContent">
      <div class="hero__content-inner">

<h1 class="hero__headline">

    <span class="hero__headline-top">
        Build
    </span>

    <div class="hero__headline-word-container">

        <span
            class="hero__headline-word"
            id="headlineWord"
        >
            Games
        </span>

    </div>

    <span class="hero__headline-bottom">
        Together
    </span>

</h1>



        <p class="hero__description animate-in" style="--delay: 0.85s">
          Orpita is where designers, developers, writers, and artists converge —
          not to ship products, but to create, collaborate, and grow.
          Every member contributes. Every role matters.
        </p>

        <div class="hero__actions animate-in" style="--delay: 1.05s">
          <a href="#" class="btn btn--primary" aria-label="Join the Orpita community">
            <span>Join Orpita</span>
            <svg class="btn__icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <a href="#" class="btn btn--ghost" aria-label="Explore community projects">
            <span>Explore Projects</span>
          </a>
        </div>

        <dl class="hero__stats animate-in" style="--delay: 1.25s">
          <div class="hero__stat">
            <dt class="hero__stat-label">Departments</dt>
            <dd class="hero__stat-value">6</dd>
          </div>
          <div class="hero__stat-sep" aria-hidden="true"></div>
          <div class="hero__stat">
            <dt class="hero__stat-label">Members</dt>
            <dd class="hero__stat-value">50+</dd>
          </div>
          <div class="hero__stat-sep" aria-hidden="true"></div>
          <div class="hero__stat">
            <dt class="hero__stat-label">Active Projects</dt>
            <dd class="hero__stat-value">12</dd>
          </div>
        </dl>

      </div>
    </div>

    <!-- <div class="hero__scroll-cue" aria-hidden="true">
      <div class="hero__scroll-cue-line"></div>
    </div> -->

  </section>

  <script src="/assets/src/js/data.js"></script>
  <script src="/assets/src/js/engine.js"></script>
  <script src="/assets/src/js/app.js"></script>
  <script>
const words = [
  "Games",
  "Art",
  "Teams",
  "Ideas",
  "Dreams"
];

const headlineWord =
  document.getElementById("headlineWord");

let currentIndex = 0;

const sleep = ms =>
  new Promise(resolve =>
    setTimeout(resolve, ms)
  );

async function changeWord() {
  
  headlineWord.style.animation =
    "slideUpOut .25s forwards";
  
  await sleep(250);
  
  currentIndex =
    (currentIndex + 1) % words.length;
  
  headlineWord.textContent =
    words[currentIndex];
  
  headlineWord.style.animation =
    "none";
  
  headlineWord.style.opacity = "0";
  headlineWord.style.transform =
    "translateY(100%)";
  
  await sleep(20);
  
  headlineWord.style.animation =
    "slideUpIn .45s forwards";
  
}

setInterval(changeWord, 3000);
</script>
</body>
</html>
