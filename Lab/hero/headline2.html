<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Headline – Building Games & Communities</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a16;
            --bg-subtle: #0f0f1e;
            --text-base: #e4e4ec;
            --text-soft: #c5c5d2;
            --purple-deep: #5b21b6;
            --purple-royal: #7c3aed;
            --purple-neon: #a855f7;
            --purple-lavender: #c4b5fd;
            --purple-soft: #ddd6fe;
            --font-clamp: clamp(2.4rem, 6.5vw, 5.5rem);
            --line-height: 1.08;
            --gap-lines: clamp(0.15em, 0.8vw, 0.35em);
            --icon-height: 0.78em;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            overflow-x: hidden;
            padding: 2rem;
        }

        /* Subtle radial background glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 55% 45%, rgba(124, 58, 237, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 40% 50%, rgba(168, 85, 247, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 55%, rgba(196, 181, 253, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Hero Container ── */
        .hero-container {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* ── Headline Block ── */
        .hero-headline {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: var(--gap-lines);
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Each Line ── */
        .hero-line {
            display: flex;
            align-items: baseline;
            flex-wrap: nowrap;
            white-space: nowrap;
            font-size: var(--font-clamp);
            font-weight: 700;
            line-height: var(--line-height);
            letter-spacing: -0.02em;
            color: var(--text-base);
            position: relative;
        }

        /* ── Static word "Building" ── */
        .word-static {
            color: var(--text-soft);
            font-weight: 500;
            letter-spacing: -0.015em;
            transition: color 0.4s ease;
        }

        /* ── Gradient animated words ── */
        .word-gradient {
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-left: 0.22em;
            background: linear-gradient(115deg,
                    var(--purple-deep) 0%,
                    var(--purple-royal) 20%,
                    var(--purple-neon) 45%,
                    var(--purple-lavender) 65%,
                    var(--purple-neon) 80%,
                    var(--purple-royal) 100%);
            background-size: 280% 100%;
            background-position: 0% 50%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: gradientFlow 5.5s cubic-bezier(0.45, 0, 0.55, 1) infinite;
            position: relative;
        }

        /* Subtle glow on gradient words */
        .word-gradient::after {
            content: '';
            position: absolute;
            inset: -0.15em -0.1em;
            background: inherit;
            background-size: inherit;
            background-position: inherit;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: blur(18px);
            opacity: 0.25;
            z-index: -1;
            animation: gradientFlow 5.5s cubic-bezier(0.45, 0, 0.55, 1) infinite;
            pointer-events: none;
        }

        /* ── Controller Icon ── */
        .controller-icon {
            height: var(--icon-height);
            width: auto;
            object-fit: contain;
            margin-left: 0.28em;
            vertical-align: baseline;
            align-self: baseline;
            flex-shrink: 0;
            display: inline-block;
            /* Subtle float animation */
            animation: iconFloat 3.8s cubic-bezier(0.45, 0, 0.55, 1) infinite;
            /* Ensure crisp rendering */
            image-rendering: auto;
            -webkit-user-drag: none;
            transition: filter 0.4s ease;
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.25));
        }

        /* ── Keyframe: Gradient Shift ── */
        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 60% 40%;
            }
            50% {
                background-position: 100% 55%;
            }
            75% {
                background-position: 40% 60%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* ── Keyframe: Icon Micro-Float ── */
        @keyframes iconFloat {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }
            25% {
                transform: translateY(-3.5px) rotate(0.6deg);
            }
            50% {
                transform: translateY(-1px) rotate(0.2deg);
            }
            75% {
                transform: translateY(-4.5px) rotate(-0.5deg);
            }
        }

        /* ── Subtle cursor proximity glow on the whole headline ── */
        .hero-headline:hover .word-gradient {
            animation-duration: 3.8s;
            transition: animation-duration 0.6s ease;
        }
        .hero-headline:hover .controller-icon {
            filter: drop-shadow(0 0 14px rgba(168, 85, 247, 0.5));
            animation-duration: 2.6s;
            transition: filter 0.5s ease, animation-duration 0.6s ease;
        }
        .hero-headline:hover .word-static {
            color: #f0f0f7;
            transition: color 0.5s ease;
        }

        /* ── Responsive Fine-Tuning ── */
        @media (max-width: 768px) {
            :root {
                --font-clamp: clamp(2rem, 7.5vw, 3.6rem);
                --icon-height: 0.74em;
                --gap-lines: clamp(0.1em, 0.6vw, 0.25em);
            }
            body {
                padding: 1.5rem;
            }
            .word-gradient::after {
                filter: blur(12px);
                opacity: 0.2;
            }
            @keyframes iconFloat {
                0%,
                100% {
                    transform: translateY(0px) rotate(0deg);
                }
                25% {
                    transform: translateY(-2.5px) rotate(0.5deg);
                }
                50% {
                    transform: translateY(-0.8px) rotate(0.15deg);
                }
                75% {
                    transform: translateY(-3.5px) rotate(-0.4deg);
                }
            }
        }

        @media (max-width: 480px) {
            :root {
                --font-clamp: clamp(1.7rem, 9vw, 2.4rem);
                --icon-height: 0.7em;
                --gap-lines: clamp(0.06em, 0.5vw, 0.18em);
            }
            body {
                padding: 1rem;
            }
            .word-gradient::after {
                filter: blur(8px);
                opacity: 0.18;
            }
            .controller-icon {
                margin-left: 0.2em;
                filter: drop-shadow(0 0 4px rgba(168, 85, 247, 0.2));
            }
            @keyframes iconFloat {
                0%,
                100% {
                    transform: translateY(0px) rotate(0deg);
                }
                25% {
                    transform: translateY(-2px) rotate(0.4deg);
                }
                50% {
                    transform: translateY(-0.5px) rotate(0.1deg);
                }
                75% {
                    transform: translateY(-3px) rotate(-0.3deg);
                }
            }
        }

        @media (min-width: 1800px) {
            :root {
                --font-clamp: clamp(5rem, 5.5vw, 7rem);
                --icon-height: 0.8em;
                --gap-lines: 0.4em;
            }
            @keyframes iconFloat {
                0%,
                100% {
                    transform: translateY(0px) rotate(0deg);
                }
                25% {
                    transform: translateY(-5px) rotate(0.7deg);
                }
                50% {
                    transform: translateY(-1.5px) rotate(0.25deg);
                }
                75% {
                    transform: translateY(-6px) rotate(-0.6deg);
                }
            }
        }
    </style>
</head>
<body>

    <!-- ═══════════════════════════════════════ -->
    <!-- HERO HEADLINE COMPONENT              -->
    <!-- ═══════════════════════════════════════ -->
    <div class="hero-container">
        <div class="hero-headline" aria-label="Building games. Building communities.">
            <!-- Line 1: Building games + controller icon -->
            <div class="hero-line line-1">
                <span class="word-static">Building</span>
                <span class="word-gradient" data-word="games">games</span>
                <img
                class="controller-icon"
                src="assets/icons/controller.png"
                alt="game controller"
                width="48"
                height="48"
                loading="eager"
                decoding="async"
                onerror="handleIconFallback(this)"
                >
            </div>
            <!-- Line 2: Building communities -->
            <div class="hero-line line-2">
                <span class="word-static">Building</span>
                <span class="word-gradient" data-word="communities">communities</span>
            </div>
        </div>
    </div>

    <script>
        /**
         * ── Hero Headline – Controller Icon Fallback ──
         * Generates a clean PNG gamepad icon via Canvas
         * if the external image fails to load.
         *
         * The generated icon is a raster PNG (NOT inline SVG),
         * satisfying the "external image file" requirement
         * while keeping the component self-contained.
         */
        function handleIconFallback(imgElement) {
            // Prevent infinite fallback loops
            if (imgElement.dataset.fallbackApplied === 'true') return;
            imgElement.dataset.fallbackApplied = 'true';

            const dataURL = generateControllerPNG();
            imgElement.src = dataURL;
            imgElement.onerror = null; // Remove handler after fallback
        }

        /**
         * Draws a modern gamepad controller icon on a canvas
         * and returns a PNG data URL.
         *
         * Canvas dimensions: 200×120 (retina-aware,
         * displayed at ~0.78em height via CSS).
         */
        function generateControllerPNG() {
            const W = 200;
            const H = 120;
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');

            // ── Clear to transparent ──
            ctx.clearRect(0, 0, W, H);

            // ── Helper: rounded rectangle path ──
            function roundRect(x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.arcTo(x + w, y, x + w, y + r, r);
                ctx.lineTo(x + w, y + h - r);
                ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
                ctx.lineTo(x + r, y + h);
                ctx.arcTo(x, y + h, x, y + h - r, r);
                ctx.lineTo(x, y + r);
                ctx.arcTo(x, y, x + r, y, r);
                ctx.closePath();
            }

            // ── Controller Body ──
            // Main body shape (wider middle, subtle grip suggestion)
            const bodyX = 18;
            const bodyY = 22;
            const bodyW = 164;
            const bodyH = 72;
            const bodyRadius = 22;

            // Body fill – soft light gray
            ctx.fillStyle = '#d8d8e0';
            roundRect(bodyX, bodyY, bodyW, bodyH, bodyRadius);
            ctx.fill();

            // Body subtle border
            ctx.strokeStyle = 'rgba(180,180,195,0.7)';
            ctx.lineWidth = 2.5;
            roundRect(bodyX, bodyY, bodyW, bodyH, bodyRadius);
            ctx.stroke();

            // ── Grip indentation hints (subtle arcs at bottom) ──
            ctx.fillStyle = 'rgba(150,150,168,0.25)';
            ctx.beginPath();
            ctx.arc(58, bodyY + bodyH - 8, 20, 0.15 * Math.PI, 0.85 * Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(142, bodyY + bodyH - 8, 20, 0.15 * Math.PI, 0.85 * Math.PI);
            ctx.fill();

            // ── Left Analog Stick ──
            const stickLX = 56;
            const stickLY = 56;
            const stickR = 15;
            // Outer ring
            ctx.fillStyle = '#bfbfcc';
            ctx.beginPath();
            ctx.arc(stickLX, stickLY, stickR, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(150,150,168,0.8)';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Inner knob
            ctx.fillStyle = '#e8e8f0';
            ctx.beginPath();
            ctx.arc(stickLX, stickLY, stickR * 0.55, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(160,160,178,0.6)';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // ── Right Analog Stick ──
            const stickRX = 144;
            const stickRY = 56;
            ctx.fillStyle = '#bfbfcc';
            ctx.beginPath();
            ctx.arc(stickRX, stickRY, stickR, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(150,150,168,0.8)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#e8e8f0';
            ctx.beginPath();
            ctx.arc(stickRX, stickRY, stickR * 0.55, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(160,160,178,0.6)';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // ── D-Pad (cross shape, upper-left) ──
            const dpadCX = 36;
            const dpadCY = 38;
            const dpadArm = 11;
            const dpadThick = 5.5;
            ctx.fillStyle = '#c8c8d4';
            // Horizontal arm
            ctx.fillRect(dpadCX - dpadArm, dpadCY - dpadThick / 2, dpadArm * 2, dpadThick);
            // Vertical arm
            ctx.fillRect(dpadCX - dpadThick / 2, dpadCY - dpadArm, dpadThick, dpadArm * 2);
            // Center dot
            ctx.fillStyle = '#b0b0be';
            ctx.beginPath();
            ctx.arc(dpadCX, dpadCY, dpadThick * 0.7, 0, Math.PI * 2);
            ctx.fill();

            // ── Face Buttons (4 small circles, upper-right, diamond pattern) ──
            const btnCX = 158;
            const btnCY = 36;
            const btnSpread = 9;
            const btnR = 4.5;
            const buttonPositions = [
                { x: btnCX, y: btnCY - btnSpread }, // top (Y / △)
                { x: btnCX - btnSpread, y: btnCY }, // left (X / □)
                { x: btnCX + btnSpread, y: btnCY }, // right (B / ○)
                { x: btnCX, y: btnCY + btnSpread }, // bottom (A / ×)
            ];

            buttonPositions.forEach((pos, i) => {
                // Button base
                ctx.fillStyle = '#d0d0da';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, btnR, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(140,140,158,0.7)';
                ctx.lineWidth = 1;
                ctx.stroke();
                // Subtle highlight
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(pos.x - 1, pos.y - 1.2, btnR * 0.5, 0, Math.PI * 2);
                ctx.fill();
            });

            // ── Shoulder button hints (top edge bumps) ──
            ctx.fillStyle = 'rgba(190,190,202,0.6)';
            roundRect(bodyX + 20, bodyY - 6, 28, 10, 6);
            ctx.fill();
            roundRect(bodyX + bodyW - 48, bodyY - 6, 28, 10, 6);
            ctx.fill();

            // ── Return as PNG data URL ──
            return canvas.toDataURL('image/png');
        }

        // ── Optional: Pre-check if the external image is reachable ──
        // If the browser has already attempted loading before the onerror
        // handler is attached, we handle it proactively.
        document.addEventListener('DOMContentLoaded', () => {
            const icon = document.querySelector('.controller-icon');
            if (icon && icon.complete && icon.naturalWidth === 0 && !icon.dataset.fallbackApplied) {
                handleIconFallback(icon);
            }
        });

        // ── Subtle mouse proximity enhancement ──
        // Adds an extra layer of polish: the gradient shifts slightly
        // based on cursor position relative to the headline.
        // This is extremely subtle (max ~3% shift) to maintain
        // the premium, non-distracting feel.
        const heroHeadline = document.querySelector('.hero-headline');
        const gradientWords = document.querySelectorAll('.word-gradient');

        if (heroHeadline && gradientWords.length > 0) {
            let rafId = null;
            let targetOffset = 0;
            let currentOffset = 0;

            heroHeadline.addEventListener('mousemove', (e) => {
                const rect = heroHeadline.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const frac = Math.max(0, Math.min(1, x / rect.width));
                // Map to a subtle offset range (-8% to +8%)
                targetOffset = (frac - 0.5) * 16;
            });

            heroHeadline.addEventListener('mouseleave', () => {
                targetOffset = 0;
            });

            function animateGradientOffset() {
                // Smooth interpolation
                currentOffset += (targetOffset - currentOffset) * 0.04;

                gradientWords.forEach((word) => {
                    // Apply a subtle additional offset on top of the CSS animation
                    // by adjusting a custom property or the animation play state
                    word.style.setProperty('--cursor-offset', `${currentOffset.toFixed(2)}%`);
                });

                rafId = requestAnimationFrame(animateGradientOffset);
            }

            // Start the smooth animation loop
            rafId = requestAnimationFrame(animateGradientOffset);

            // Cleanup (optional, for SPA scenarios)
            // In a full application, you'd cancel the RAF on component unmount.
            // For this standalone component, it runs for the page lifetime.
        }

        console.log(
            '%c🎮 Hero Headline Ready %c| %cBuilding games. Building communities.%c',
            'font-size:14px;',
            '',
            'color:#a855f7;font-weight:700;',
            ''
        );
    </script>
</body>
</html>
