<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Together - Hero Headline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0f;
            --text-primary: #f1f1f7;
            --text-secondary: #b0b0c0;
            --accent-color: #8b5cf6;
            --accent-glow-1: rgba(139, 92, 246, 0.6);
            --accent-glow-2: rgba(139, 92, 246, 0.3);
            --accent-glow-3: rgba(139, 92, 246, 0.12);
            --transition-speed: 0.45s;
            --display-duration: 3000ms;
            --icon-float-amplitude: 7px;
            --icon-float-period: 3.4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Mosaic Background ─────────────────────── */
        .hero-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            isolation: isolate;
            padding: 2rem;
        }

        /* Subtle animated mosaic grid */
        .mosaic-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .mosaic-layer::before {
            content: '';
            position: absolute;
            inset: -10%;
            background-image:
                radial-gradient(circle at 25% 35%, var(--accent-glow-3) 0%, transparent 55%),
                radial-gradient(circle at 65% 60%, var(--accent-glow-3) 0%, transparent 50%),
                radial-gradient(circle at 40% 75%, rgba(120, 100, 200, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 20%, rgba(160, 140, 220, 0.05) 0%, transparent 45%);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: mosaicDrift 18s ease-in-out infinite;
        }

        .mosaic-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 40px,
                    rgba(255, 255, 255, 0.008) 40px,
                    rgba(255, 255, 255, 0.008) 41px),
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 40px,
                    rgba(255, 255, 255, 0.008) 40px,
                    rgba(255, 255, 255, 0.008) 41px);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 70%);
        }

        /* Floating orbs that shift with accent */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .orb-1 {
            width: 380px;
            height: 380px;
            top: -8%;
            left: 10%;
            background: var(--accent-color);
            animation: orbFloat1 14s ease-in-out infinite;
        }
        .orb-2 {
            width: 280px;
            height: 280px;
            bottom: -5%;
            right: 8%;
            background: var(--accent-color);
            animation: orbFloat2 16s ease-in-out infinite;
            filter: blur(90px);
            opacity: 0.18;
        }
        .orb-3 {
            width: 200px;
            height: 200px;
            top: 45%;
            left: 55%;
            background: var(--accent-color);
            animation: orbFloat3 12s ease-in-out infinite;
            filter: blur(70px);
            opacity: 0.15;
        }

        @keyframes orbFloat1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(60px, -40px) scale(1.1);
            }
            50% {
                transform: translate(-20px, 30px) scale(0.9);
            }
            75% {
                transform: translate(-50px, -20px) scale(1.05);
            }
        }
        @keyframes orbFloat2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-50px, -30px) scale(1.12);
            }
            66% {
                transform: translate(30px, 20px) scale(0.88);
            }
        }
        @keyframes orbFloat3 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(40px, -25px) scale(1.08);
            }
        }
        @keyframes mosaicDrift {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(15px, -10px) scale(1.02);
            }
            50% {
                transform: translate(-10px, 8px) scale(0.98);
            }
            75% {
                transform: translate(-8px, -5px) scale(1.01);
            }
        }

        /* ── Headline Container ──────────────────── */
        .headline-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: clamp(0.3rem, 1.2vw, 0.8rem);
        }

        /* ── Top & Bottom Words ─────────────────── */
        .word-static {
            font-weight: 300;
            color: var(--text-secondary);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-size: clamp(1rem, 2.2vw, 1.6rem);
            transition: color 0.8s ease;
            line-height: 1.1;
        }
        .word-top {
            margin-bottom: -0.2em;
        }
        .word-bottom {
            margin-top: -0.2em;
        }

        /* ── Dynamic Word Wrapper ────────────────── */
        .dynamic-word-wrapper {
            position: relative;
            display: inline-block;
            /* extra padding to accommodate floating icon overlap */
            padding: 0.3em 0.4em 0.1em;
            margin: -0.1em 0;
        }

        /* ── Dynamic Word ────────────────────────── */
        .dynamic-word {
            display: inline-block;
            font-weight: 700;
            font-size: clamp(3.2rem, 8.5vw, 7.5rem);
            line-height: 1.05;
            color: #ffffff;
            letter-spacing: -0.01em;
            transition:
                opacity var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                filter var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                text-shadow 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow:
                0 0 18px var(--accent-glow-1),
                0 0 45px var(--accent-glow-2),
                0 0 80px var(--accent-glow-3),
                0 0 120px rgba(139, 92, 246, 0.06);
            cursor: default;
        }

        .dynamic-word.is-exiting {
            opacity: 0;
            filter: blur(6px);
            transform: translateY(-12px) scale(0.96);
            transition:
                opacity 0.35s cubic-bezier(0.55, 0, 1, 0.45),
                filter 0.35s cubic-bezier(0.55, 0, 1, 0.45),
                transform 0.35s cubic-bezier(0.55, 0, 1, 0.45),
                text-shadow 0.35s cubic-bezier(0.55, 0, 1, 0.45),
                color 0.35s cubic-bezier(0.55, 0, 1, 0.45);
        }

        .dynamic-word.is-entering {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0) scale(1);
            transition:
                opacity 0.4s cubic-bezier(0, 0, 0.2, 1) 0.05s,
                filter 0.4s cubic-bezier(0, 0, 0.2, 1) 0.05s,
                transform 0.4s cubic-bezier(0, 0, 0.2, 1) 0.05s,
                text-shadow 0.8s cubic-bezier(0, 0, 0.2, 1),
                color 0.8s cubic-bezier(0, 0, 0.2, 1);
        }

        /* ── Floating Icon ───────────────────────── */
        .floating-icon {
            position: absolute;
            pointer-events: none;
            z-index: 3;
            /* Position: above and slightly right of the dynamic word */
            top: -18px;
            right: -10px;
            width: clamp(26px, 4vw, 36px);
            height: clamp(26px, 4vw, 36px);
            opacity: 0.85;
            transition:
                opacity var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                filter var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            animation: iconFloat var(--icon-float-period) ease-in-out infinite;
            filter: drop-shadow(0 0 10px var(--accent-glow-1)) drop-shadow(0 0 20px var(--accent-glow-2));
            color: var(--accent-color);
        }

        .floating-icon.is-exiting {
            opacity: 0;
            filter: blur(4px) drop-shadow(0 0 5px transparent);
            transform: translateY(-8px) scale(0.8);
            transition:
                opacity 0.3s cubic-bezier(0.55, 0, 1, 0.45),
                filter 0.3s cubic-bezier(0.55, 0, 1, 0.45),
                transform 0.3s cubic-bezier(0.55, 0, 1, 0.45);
        }

        .floating-icon.is-entering {
            opacity: 0.85;
            filter: drop-shadow(0 0 10px var(--accent-glow-1)) drop-shadow(0 0 20px var(--accent-glow-2));
            transform: translateY(0) scale(1);
            transition:
                opacity 0.38s cubic-bezier(0, 0, 0.2, 1) 0.06s,
                filter 0.38s cubic-bezier(0, 0, 0.2, 1) 0.06s,
                transform 0.38s cubic-bezier(0, 0, 0.2, 1) 0.06s;
        }

        @keyframes iconFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(calc(var(--icon-float-amplitude) * -1));
            }
            60% {
                transform: translateY(calc(var(--icon-float-amplitude) * 0.35));
            }
            85% {
                transform: translateY(calc(var(--icon-float-amplitude) * -0.55));
            }
        }

        .floating-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Subtle ring indicator ────────────────── */
        .progress-ring {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 7px;
            z-index: 2;
            pointer-events: none;
        }
        .progress-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-dot.active {
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow-1), 0 0 20px var(--accent-glow-2);
            width: 7px;
            height: 7px;
            transform: translateY(-1px);
        }

        /* ── Responsive ──────────────────────────── */
        @media (max-width: 768px) {
            .floating-icon {
                top: -12px;
                right: -6px;
                width: 22px;
                height: 22px;
            }
            .dynamic-word {
                font-size: clamp(2.4rem, 10vw, 4.5rem);
            }
            .word-static {
                font-size: clamp(0.85rem, 3vw, 1.2rem);
                letter-spacing: 0.16em;
            }
            .orb-1 {
                width: 200px;
                height: 200px;
            }
            .orb-2 {
                width: 160px;
                height: 160px;
            }
            .orb-3 {
                width: 120px;
                height: 120px;
            }
        }
        @media (max-width: 480px) {
            .floating-icon {
                top: -8px;
                right: -2px;
                width: 18px;
                height: 18px;
            }
            .dynamic-word {
                font-size: clamp(2rem, 11vw, 3.2rem);
            }
            .word-static {
                font-size: clamp(0.7rem, 3.5vw, 1rem);
                letter-spacing: 0.12em;
            }
            .progress-dot {
                width: 4px;
                height: 4px;
                gap: 5px;
            }
            .progress-dot.active {
                width: 5px;
                height: 5px;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section" id="heroSection">
        <!-- Dynamic mosaic background elements -->
        <div class="mosaic-layer" aria-hidden="true"></div>
        <div class="orb orb-1" aria-hidden="true"></div>
        <div class="orb orb-2" aria-hidden="true"></div>
        <div class="orb orb-3" aria-hidden="true"></div>

        <!-- Headline -->
        <div class="headline-container" id="headlineContainer">
            <span class="word-static word-top">Build</span>
            <div class="dynamic-word-wrapper" id="dynamicWordWrapper">
                <span class="dynamic-word is-entering" id="dynamicWord">Games</span>
                <div class="floating-icon is-entering" id="floatingIcon" aria-hidden="true">
                    <!-- Icon SVG injected by JS -->
                </div>
            </div>
            <span class="word-static word-bottom">Together</span>
            <!-- Progress dots -->
            <div class="progress-ring" id="progressRing" aria-hidden="true"></div>
        </div>
    </section>

    <script>
        (function() {
            // ──────────────────────────────────────
            // THEME DATA SYSTEM

            const themes = [{

            // ──────────────────────────────────────
            // SVG ICON LIBRARY
            // ──────────────────────────────────────
            const iconSVGs = {

            // ──────────────────────────────────────
            // DOM REFERENCES
            // ──────────────────────────────────────
            const heroSection = document.getElementById('heroSection');
            const dynamicWord = document.getElementById('dynamicWord');
            const floatingIcon = document.getElementById('floatingIcon');
            const progressRing = document.getElementById('progressRing');
            const orbs = document.querySelectorAll('.orb');

            // ──────────────────────────────────────
            // STATE
            // ──────────────────────────────────────
            let currentIndex = 0;
            let isTransitioning = false;
            let cycleInterval = null;
            const DISPLAY_DURATION = 3000; // ms per word (within 2.5-4s range)
            const EXIT_DURATION = 350; // ms for fade-out
            const ENTER_DURATION = 400; // ms for fade-in (slightly longer for smooth settle)

            // ──────────────────────────────────────
            // BUILD PROGRESS DOTS
            // ──────────────────────────────────────
            function buildProgressDots() {
                progressRing.innerHTML = '';
                themes.forEach((_, i) => {
                    const dot = document.createElement('span');
                    dot.className = 'progress-dot';
                    if (i === currentIndex) dot.classList.add('active');
                    dot.setAttribute('data-index', i);
                    progressRing.appendChild(dot);
                });
            }

            function updateProgressDot() {
                const dots = progressRing.querySelectorAll('.progress-dot');
                dots.forEach((dot, i) => {
                    if (i === currentIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
            }

            // ──────────────────────────────────────
            // APPLY THEME TO CSS CUSTOM PROPERTIES
            // ──────────────────────────────────────
            function applyTheme(theme) {
                const root = document.documentElement;
                root.style.setProperty('--accent-color', theme.accent);
                root.style.setProperty('--accent-glow-1', theme.accentGlow1);
                root.style.setProperty('--accent-glow-2', theme.accentGlow2);
                root.style.setProperty('--accent-glow-3', theme.accentGlow3);

                // Update orb colors
                orbs.forEach(orb => {
                    orb.style.background = theme.accent;
                });

                // Update dynamic word text styling
                dynamicWord.style.fontWeight = theme.fontWeight;
                dynamicWord.style.letterSpacing = theme.letterSpacing;

                // Build text-shadow based on intensity
                const intensity = theme.textShadowIntensity;
                const baseBlur1 = Math.round(18 * intensity);
                const baseBlur2 = Math.round(45 * intensity);
                const baseBlur3 = Math.round(80 * intensity);
                const baseBlur4 = Math.round(120 * intensity);

                dynamicWord.style.textShadow = `
              0 0 ${baseBlur1}px ${theme.accentGlow1},
              0 0 ${baseBlur2}px ${theme.accentGlow2},
              0 0 ${baseBlur3}px ${theme.accentGlow3},
              0 0 ${baseBlur4}px rgba(${hexToRgb(theme.accent)}, 0.06)
            `;
            }

            // Helper: convert hex to rgb string
            function hexToRgb(hex) {
                const clean = hex.replace('#', '');
                const r = parseInt(clean.substring(0, 2), 16);
                const g = parseInt(clean.substring(2, 4), 16);
                const b = parseInt(clean.substring(4, 6), 16);
                return `${r}, ${g}, ${b}`;
            }

            // ──────────────────────────────────────
            // UPDATE ICON SVG
            // ──────────────────────────────────────
            function updateIcon(iconName) {
                const svgString = iconSVGs[iconName] || iconSVGs['sparkle'];
                floatingIcon.innerHTML = svgString;
                // Set color via the SVG's currentColor (inherits from parent)
                floatingIcon.style.color = themes[currentIndex].accent;
            }

            // ──────────────────────────────────────
            // TRANSITION TO NEXT WORD
            // ──────────────────────────────────────
            function transitionToWord(targetIndex) {
                if (isTransitioning) return;
                if (targetIndex === currentIndex) return;
                isTransitioning = true;

                const nextTheme = themes[targetIndex];

                // Phase 1: Exit current word & icon
                dynamicWord.classList.remove('is-entering');
                dynamicWord.classList.add('is-exiting');
                floatingIcon.classList.remove('is-entering');
                floatingIcon.classList.add('is-exiting');

                // After exit animation completes, swap content
                setTimeout(() => {
                    // Update text content
                    dynamicWord.textContent = nextTheme.word;

                    // Update icon
                    updateIcon(nextTheme.icon);

                    // Update current index
                    currentIndex = targetIndex;

                    // Apply new theme
                    applyTheme(nextTheme);
                    updateProgressDot();

                    // Phase 2: Enter new word & icon
                    dynamicWord.classList.remove('is-exiting');
                    dynamicWord.classList.add('is-entering');
                    floatingIcon.classList.remove('is-exiting');
                    floatingIcon.classList.add('is-entering');

                    // After enter animation settles
                    setTimeout(() => {
                        dynamicWord.classList.remove('is-entering');
                        floatingIcon.classList.remove('is-entering');
                        isTransitioning = false;
                    }, ENTER_DURATION + 60);
                }, EXIT_DURATION);
            }

            // ──────────────────────────────────────
            // AUTO-CYCLE
            // ──────────────────────────────────────
            function startCycle() {
                stopCycle();
                cycleInterval = setInterval(() => {
                    if (!isTransitioning) {
                        const nextIndex = (currentIndex + 1) % themes.length;
                        transitionToWord(nextIndex);
                    }
                }, DISPLAY_DURATION);
            }

            function stopCycle() {
                if (cycleInterval) {
                    clearInterval(cycleInterval);
                    cycleInterval = null;
                }
            }

            // ──────────────────────────────────────
            // INITIALIZATION
            // ──────────────────────────────────────
            function init() {
                // Build progress dots
                buildProgressDots();

                // Set initial theme (Games - index 0)
                const initialTheme = themes[0];
                applyTheme(initialTheme);
                updateIcon(initialTheme.icon);
                dynamicWord.textContent = initialTheme.word;
                dynamicWord.style.fontWeight = initialTheme.fontWeight;
                dynamicWord.style.letterSpacing = initialTheme.letterSpacing;
                floatingIcon.style.color = initialTheme.accent;
                updateProgressDot();

                // Ensure entering state for initial render
                dynamicWord.classList.add('is-entering');
                floatingIcon.classList.add('is-entering');
                setTimeout(() => {
                    dynamicWord.classList.remove('is-entering');
                    floatingIcon.classList.remove('is-entering');
                }, ENTER_DURATION + 60);

                // Start auto-cycle after initial display
                setTimeout(() => {
                    startCycle();
                }, DISPLAY_DURATION);
            }

            // ──────────────────────────────────────
            // PAUSE ON HOVER (optional enhancement)
            // ──────────────────────────────────────
            const headlineContainer = document.getElementById('headlineContainer');
            headlineContainer.addEventListener('mouseenter', () => {
                stopCycle();
            });
            headlineContainer.addEventListener('mouseleave', () => {
                if (!cycleInterval) {
                    startCycle();
                }
            });

            // ──────────────────────────────────────
            // CLICK TO ADVANCE (optional)
            // ──────────────────────────────────────
            dynamicWord.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!isTransitioning) {
                    stopCycle();
                    const nextIndex = (currentIndex + 1) % themes.length;
                    transitionToWord(nextIndex);
                    // Restart cycle after the manual advance
                    setTimeout(() => {
                        if (!cycleInterval) startCycle();
                    }, DISPLAY_DURATION);
                }
            });
            dynamicWord.style.cursor = 'pointer';
            dynamicWord.title = 'Click to advance';

            // ──────────────────────────────────────
            // HANDLE PAGE VISIBILITY
            // ──────────────────────────────────────
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    stopCycle();
                } else {
                    if (!cycleInterval && !isTransitioning) {
                        startCycle();
                    }
                }
            });

            // ──────────────────────────────────────
            // START
            // ──────────────────────────────────────
            init();

            console.log('✨ Build Together — Hero Headline initialized');
            console.log(`   ${themes.length} themes loaded | ${DISPLAY_DURATION}ms per word`);
            console.log('   Hover to pause | Click dynamic word to advance');
        })();
    </script>
</body>
</html>
